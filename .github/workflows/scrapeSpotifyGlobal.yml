name: Scraping Top 50 Spotify Daily y Mensual

on:
  schedule:
    - cron: "0 0 1 * *"   # día 1 de cada mes
    - cron: "0 0 * * *"   # todos los días
  workflow_dispatch:

# 🟢 IMPORTANTE: Permisos para que la Action pueda guardar archivos
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      # 🟢 Instalar navegadores para Playwright (necesario para tus scripts)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # 🟢 Script día 1
      - name: Ejecutar scrapeSpotify.js
        if: github.event.schedule == '0 0 1 * *'
        run: node scrapeSpotify.js

      # 🔵 Script diario / General
      - name: Ejecutar scrapeSpotifyGlobalSimple.js
        if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
        run: node scrapeSpotifyGlobalSimple.js

      # 🚀 PASO CLAVE: Guardar cambios en el repositorio
      - name: Commit y Push de los datos actualizados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spotify-top-50-songs-global.json spotify-data.json
          git commit -m "chore: actualización automática de datos Spotify [skip ci]" || echo "No hay cambios para commitear"
          git push
